#!/bin/bash
# OpenClaw-PM local config for this machine
# Source this from imported scripts to adapt paths/ports/jobs safely.

OPENCLAW_PM_OPENCLAW_DIR="${OPENCLAW_PM_OPENCLAW_DIR:-$HOME/.openclaw}"
OPENCLAW_PM_WORKSPACE_DIR="${OPENCLAW_PM_WORKSPACE_DIR:-/root/.openclaw/workspace}"
OPENCLAW_PM_GATEWAY_PORT="${OPENCLAW_PM_GATEWAY_PORT:-18789}"
OPENCLAW_PM_GATEWAY_LOG="${OPENCLAW_PM_GATEWAY_LOG:-$OPENCLAW_PM_OPENCLAW_DIR/logs/gateway.log}"
OPENCLAW_PM_TODAY_LOG="${OPENCLAW_PM_TODAY_LOG:-/tmp/openclaw/openclaw-$(date +%Y-%m-%d).log}"
OPENCLAW_PM_LOG_DIR="${OPENCLAW_PM_LOG_DIR:-$OPENCLAW_PM_OPENCLAW_DIR/logs}"
OPENCLAW_PM_HEALTH_LOG="${OPENCLAW_PM_HEALTH_LOG:-$OPENCLAW_PM_LOG_DIR/health-check.log}"
OPENCLAW_PM_RETRY_STATE_FILE="${OPENCLAW_PM_RETRY_STATE_FILE:-$OPENCLAW_PM_OPENCLAW_DIR/retry-state.json}"
OPENCLAW_PM_LOCK_TIMEOUT_MINUTES="${OPENCLAW_PM_LOCK_TIMEOUT_MINUTES:-5}"
OPENCLAW_PM_LOCK_FORCE_REMOVE_MINUTES="${OPENCLAW_PM_LOCK_FORCE_REMOVE_MINUTES:-15}"
OPENCLAW_PM_QUEUE_STUCK_MINUTES="${OPENCLAW_PM_QUEUE_STUCK_MINUTES:-3}"
OPENCLAW_PM_MAX_RETRIES="${OPENCLAW_PM_MAX_RETRIES:-5}"
OPENCLAW_PM_RETRY_INTERVAL_SECONDS="${OPENCLAW_PM_RETRY_INTERVAL_SECONDS:-120}"
# name|job_id entries; keep blank until we confirm your real critical jobs.
OPENCLAW_PM_CRITICAL_JOBS_FILE="${OPENCLAW_PM_CRITICAL_JOBS_FILE:-$OPENCLAW_PM_WORKSPACE_DIR/scripts/openclaw-pm/critical-jobs.txt}"
